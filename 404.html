<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not found · Matt Everard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2280%22 font-size=%2290%22 font-family=%22monospace%22 fill=%22%23222%22>m</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400&family=JetBrains+Mono:wght@400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fbfaf7;
      --text: #1a1a1a;
      --text-secondary: #555;
      --text-tertiary: #999;
      --accent: #8a3324;
      --border: #e5e1d8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1816;
        --text: #f0ede5;
        --text-secondary: #b5b1a7;
        --text-tertiary: #7a766e;
        --accent: #d9846a;
        --border: #35322d;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Serif 4', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 480px;
      text-align: left;
    }
    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-tertiary);
      letter-spacing: 0.5px;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.5rem;
      font-weight: 500;
      line-height: 1.1;
      margin-bottom: 1.25rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }
    em { font-style: italic; }
    a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="code">ERROR 404 · PAGE NOT FOUND</p>
    <h1>Nothing here.</h1>
    <p>This page either never existed, moved, or — like most of the jobs I've held — quietly faded out without telling anyone.</p>
    <a href="/">← Back to the homepage</a>
  </div>
</body>
</html>
